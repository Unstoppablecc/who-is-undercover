        <text x="10" y="22" font-size="13" font-weight="800" fill="#0f766e">1号</text>
        <text x="10" y="43" font-size="15" font-weight="750" fill="#172033">玩家A</text>

        <rect x="114" y="0" width="101" height="58" rx="8" fill="#e4f7ec" stroke="#9bd8b5"/>
        <text x="124" y="22" font-size="13" font-weight="800" fill="#0f766e">2号</text>
        <text x="124" y="43" font-size="15" font-weight="750" fill="#172033">玩家B</text>

        <rect x="229" y="0" width="101" height="58" rx="8" fill="#ffe4e1" stroke="#f0a6a6"/>
        <text x="239" y="22" font-size="13" font-weight="800" fill="#b42318">5号</text>
        <text x="239" y="43" font-size="15" font-weight="750" fill="#172033">出局</text>

        <rect x="0" y="66" width="101" height="58" rx="8" fill="#ffffff" stroke="#d7e0ea"/>
        <text x="10" y="88" font-size="13" font-weight="800" fill="#0f766e">4号</text>
        <text x="10" y="109" font-size="15" font-weight="750" fill="#172033">玩家D</text>

        <rect x="114" y="66" width="101" height="58" rx="8" fill="#fff1b8" stroke="#e0bd55"/>
        <text x="124" y="88" font-size="13" font-weight="800" fill="#a16207">3号（我）</text>
        <text x="124" y="109" font-size="15" font-weight="750" fill="#172033">已翻两次</text>

        <rect x="229" y="66" width="101" height="58" rx="8" fill="#ffffff" stroke="#d7e0ea"/>
        <text x="239" y="88" font-size="13" font-weight="800" fill="#0f766e">6号</text>
        <text x="239" y="109" font-size="15" font-weight="750" fill="#172033">玩家F</text>
      </g>
    </g>
