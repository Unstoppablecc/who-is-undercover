      <rect x="176" y="34" width="64" height="34" rx="8" fill="#f8fafc" stroke="#d7e0ea"/>
      <text x="191" y="56" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#172033">8421</text>
