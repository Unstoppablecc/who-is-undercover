    <text x="22" y="42" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#b42318">出局卡牌</text>
    <text x="22" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#7f1d1d">浅红底色，保留玩家号和昵称</text>
  </g>

  <g transform="translate(436 56)" filter="url(#shadow)">
