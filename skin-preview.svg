      <rect x="10" y="10" width="310" height="206" rx="6" fill="none" stroke="#b8ddd8"/>
      <text x="112" y="132" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="46" font-weight="900" fill="#172033">3号</text>
    </g>

