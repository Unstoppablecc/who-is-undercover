      <text x="48" y="113" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">6</text>
      <rect x="120" y="92" width="90" height="32" rx="8" fill="#f8fafc" stroke="#d7e0ea"/>
      <text x="156" y="113" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#172033">1</text>
      <rect x="228" y="92" width="88" height="32" rx="8" fill="#f8fafc" stroke="#d7e0ea"/>
      <text x="250" y="113" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="800" fill="#172033">中等</text>

      <rect x="12" y="132" width="70" height="20" rx="10" fill="#ffffff" stroke="#d7e0ea"/>
      <text x="25" y="146" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" font-weight="700" fill="#607086">房间 8421</text>
      <rect x="88" y="132" width="66" height="20" rx="10" fill="#ffffff" stroke="#d7e0ea"/>
      <text x="102" y="146" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" font-weight="700" fill="#607086">6/6</text>
