<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="820" fill="#f4f7fb"/>
  <rect x="36" y="36" width="1128" height="748" rx="8" fill="#ffffff" stroke="#d7e0ea"/>

  <text x="72" y="92" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="800" fill="#172033">谁是卧底发牌器 · 白色桌游皮肤</text>
  <text x="74" y="130" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#607086">更大的主卡牌、轻量设置区、清晰的房间状态和投票区域，适合安卓手机浏览器。</text>

  <g transform="translate(80 190)">
    <rect x="0" y="0" width="282" height="120" rx="8" fill="#f8fafc" stroke="#d7e0ea"/>
    <rect x="0" y="0" width="282" height="4" rx="4" fill="#0f766e"/>
    <text x="22" y="38" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#172033">设计重点</text>
    <text x="22" y="70" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#607086">设置收纳后，卡牌区域更突出</text>
    <text x="22" y="96" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#607086">翻牌、二次翻牌、出局状态更醒目</text>
  </g>

  <g transform="translate(80 340)">
    <rect x="0" y="0" width="282" height="156" rx="8" fill="#ffffff" stroke="#d7e0ea"/>
    <text x="22" y="38" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#172033">颜色状态</text>
    <rect x="22" y="58" width="72" height="36" rx="8" fill="#e4f7ec" stroke="#9bd8b5"/>
    <text x="110" y="82" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#607086">已看过一次</text>
    <rect x="22" y="104" width="72" height="36" rx="8" fill="#fff1b8" stroke="#e0bd55"/>
    <text x="110" y="128" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#607086">已看过两次</text>
  </g>

  <g transform="translate(80 530)">
