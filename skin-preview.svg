  <g transform="translate(872 198)">
    <rect x="0" y="0" width="244" height="92" rx="8" fill="#e5f4f1" stroke="#b8ddd8"/>
    <text x="24" y="38" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#0b5f59">主色</text>
    <text x="24" y="66" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#0b5f59">青绿色，用在操作和房间状态</text>
  </g>
  <g transform="translate(872 318)">
    <rect x="0" y="0" width="244" height="92" rx="8" fill="#eaf1ff" stroke="#c8d7ff"/>
    <text x="24" y="38" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#2563eb">信息区</text>
    <text x="24" y="66" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#2563eb">投票进度更容易扫一眼看懂</text>
  </g>
  <g transform="translate(872 438)">
    <rect x="0" y="0" width="244" height="92" rx="8" fill="#fff4d6" stroke="#f0d28a"/>
    <text x="24" y="38" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#a16207">结果区</text>
    <text x="24" y="66" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#a16207">游戏结果和出局信息更醒目</text>
  </g>
